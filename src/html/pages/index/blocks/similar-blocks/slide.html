<li class="similar-slider__slide swiper-slide">
  <article class="similar-card responsive-media">
    <div class="similar-card__header">
      <h3 class="similar-card__title">
        <a href="#">@@title</a>
      </h3>
      <div class="similar-card__characteristics similar-characteristics">
        <div class="similar-characteristics__item">
          <div class="similar-characteristics__icon similar-characteristics__icon--big" aria-hidden="true">
            <svg width="32" height="32">
              <use xlink:href="#icon-sizes"></use>
            </svg>
          </div>
          <div class="visually-hidden">Габариты</div>
          <div class="similar-characteristics__value">@@sizes м</div>
        </div>
        <div class="similar-characteristics__item">
          <div class="similar-characteristics__icon" aria-hidden="true">
            <svg width="20" height="20">
              <use xlink:href="#icon-area"></use>
            </svg>
          </div>
          <div class="visually-hidden">Площадь</div>
          <div class="similar-characteristics__value">@@area м2</div>
        </div>
      </div>
    </div>
    <ul class="similar-tags">
      <li class="similar-tags__item">
        <a class="similar-tags__link" href="#">1 этаж</a>
      </li>
      <li class="similar-tags__item">
        <a class="similar-tags__link" href="#">@@tag</a>
      </li>
      <li class="similar-tags__item">
        <a class="similar-tags__link similar-tags__link--bold" href="#">Авторский проект</a>
      </li>
    </ul>
    <img src="img/images/pages/index/similar/@@image.jpg" alt="" loading="lazy">
  </article>
</li>
