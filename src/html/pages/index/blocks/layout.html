<section class="project-layout" id="section-project-layout" aria-labelledby="title-project-layout">
  <div class="project-layout__inner">
    <div class="layout-content">
      <h2 class="layout-content__title" id="title-project-layout">Хотите изменить планировку?</h2>
      <p class="layout-content__text">Это совсем просто! Назначьте встречу с нашим менеджером и на основании ваших идей мы создадим индивидуальную планировку под вас</p>
      <form class="layout-form" id="form-layout" action="#">
        <input class="layout-form__input" id="form-layout-tel" name="form-layout-tel" type="tel" inputmode="tel" placeholder="+7(___)___-__-__" required>
        <button class="layout-form__button" type="submit">Отправить</button>
      </form>
    </div>
    <div class="layout-laptop">
      <div class="layout-laptop__inner">
        <div class="layout-laptop__item responsive-media">
          <img src="img/images/pages/index/layout/1.png" alt="" loading="lazy">
        </div>
        <div class="layout-laptop__project responsive-media">
          <img src="img/images/pages/index/layout/2.jpg" alt="" loading="lazy">
        </div>
      </div>
    </div>
  </div>
</section>
